name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本號（例如 v1.0.0）'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  # ── Android APK ─────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Add Android platform
        working-directory: flutter_app
        run: flutter create --platforms=android . --project-name french_learning_app

      - name: Download fonts
        run: |
          mkdir -p flutter_app/assets/fonts
          cd flutter_app/assets/fonts
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Regular.ttf" -o Spectral-Regular.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Italic.ttf"  -o Spectral-Italic.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Bold.ttf"    -o Spectral-Bold.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Regular.otf" -o NotoSansTC-Regular.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Medium.otf" -o NotoSansTC-Medium.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Bold.otf"   -o NotoSansTC-Bold.ttf
          ls -lh

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate code (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          mv flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             FrenchMind-${VERSION}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: FrenchMind-*-android.apk
          retention-days: 7

  # ── Windows ──────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Add Windows platform
        working-directory: flutter_app
        run: flutter create --platforms=windows . --project-name french_learning_app

      - name: Download fonts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "flutter_app\assets\fonts" | Out-Null
          $dir = "flutter_app\assets\fonts"
          $fonts = @{
            "Spectral-Regular.ttf"   = "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Regular.ttf"
            "Spectral-Italic.ttf"    = "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Italic.ttf"
            "Spectral-Bold.ttf"      = "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Bold.ttf"
            "NotoSansTC-Regular.ttf" = "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Regular.otf"
            "NotoSansTC-Medium.ttf"  = "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Medium.otf"
            "NotoSansTC-Bold.ttf"    = "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Bold.otf"
          }
          foreach ($name in $fonts.Keys) {
            Invoke-WebRequest -Uri $fonts[$name] -OutFile "$dir\$name"
            Write-Output "Downloaded $name"
          }

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate code (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        working-directory: flutter_app
        run: |
          flutter build windows --release `
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} `
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package ZIP
        shell: pwsh
        run: |
          $VERSION = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ github.event.inputs.version }}" }
          $src = "flutter_app\build\windows\x64\runner\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "FrenchMind-${VERSION}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: FrenchMind-*-windows.zip
          retention-days: 7

  # ── macOS ────────────────────────────────────────────────────
  build-macos:
    name: 🍎 Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Add macOS platform
        working-directory: flutter_app
        run: flutter create --platforms=macos . --project-name french_learning_app

      - name: Set macOS deployment target to 10.15
        working-directory: flutter_app/macos
        run: |
          sed -i '' "s/platform :osx, '10.14'/platform :osx, '10.15'/" Podfile
          sed -i '' "s/platform :osx, '10.11'/platform :osx, '10.15'/" Podfile
          sed -i '' "s/MACOSX_DEPLOYMENT_TARGET = 10.14/MACOSX_DEPLOYMENT_TARGET = 10.15/g" Runner.xcodeproj/project.pbxproj
          grep "platform :osx" Podfile

      - name: Download fonts
        run: |
          mkdir -p flutter_app/assets/fonts
          cd flutter_app/assets/fonts
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Regular.ttf" -o Spectral-Regular.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Italic.ttf"  -o Spectral-Italic.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Bold.ttf"    -o Spectral-Bold.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Regular.otf" -o NotoSansTC-Regular.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Medium.otf" -o NotoSansTC-Medium.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Bold.otf"   -o NotoSansTC-Bold.ttf
          ls -lh

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate code (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        working-directory: flutter_app
        run: |
          flutter build macos --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          APP="flutter_app/build/macos/Build/Products/Release/french_learning_app.app"
          hdiutil create -volname "FrenchMind" \
            -srcfolder "$APP" -ov -format UDZO \
            "FrenchMind-${VERSION}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: FrenchMind-*-macos.dmg
          retention-days: 7

  # ── iOS IPA ──────────────────────────────────────────────────
  build-ios:
    name: 📱 Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Add iOS platform
        working-directory: flutter_app
        run: flutter create --platforms=ios . --project-name french_learning_app

      - name: Set iOS deployment target to 13.0
        working-directory: flutter_app/ios
        run: |
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/" Podfile
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/" Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g" Runner.xcodeproj/project.pbxproj
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g" Runner.xcodeproj/project.pbxproj
          grep "platform :ios" Podfile

      - name: Download fonts
        run: |
          mkdir -p flutter_app/assets/fonts
          cd flutter_app/assets/fonts
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Regular.ttf" -o Spectral-Regular.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Italic.ttf"  -o Spectral-Italic.ttf
          curl -sL "https://github.com/googlefonts/spectral/raw/main/fonts/ttf/Spectral-Bold.ttf"    -o Spectral-Bold.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Regular.otf" -o NotoSansTC-Regular.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Medium.otf" -o NotoSansTC-Medium.ttf
          curl -sL "https://github.com/googlefonts/noto-cjk/raw/main/Sans/SubsetOTF/TC/NotoSansCJKtc-Bold.otf"   -o NotoSansTC-Bold.ttf
          ls -lh

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate code (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        working-directory: flutter_app
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package IPA
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          mkdir -p Payload
          cp -r flutter_app/build/ios/iphoneos/Runner.app Payload/
          zip -r "FrenchMind-${VERSION}-ios.ipa" Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: FrenchMind-*-ios.ipa
          retention-days: 7

  # ── Create GitHub Release ────────────────────────────────────
  create-release:
    name: 🚀 Create GitHub Release
    needs: [build-android, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    if: always() && (needs.build-android.result == 'success' || needs.build-windows.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "FrenchMind ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## FrenchMind ${{ steps.version.outputs.version }}

            法語學習 App — 支援 20,000 個法文單字 + 繁體中文翻譯

            ### 📥 下載說明

            | 平台 | 檔案 | 說明 |
            |------|------|------|
            | 🤖 Android | `FrenchMind-*-android.apk` | 下載後在設定開啟「未知來源安裝」|
            | 🪟 Windows | `FrenchMind-*-windows.zip` | 解壓縮後執行 `french_learning_app.exe` |
            | 🍎 macOS | `FrenchMind-*-macos.dmg` | 開啟 DMG 後拖入 Applications |
            | 📱 iOS | `FrenchMind-*-ios.ipa` | 需使用 AltStore / Sideloadly 安裝 |

            ### 🔧 系統需求
            - Android 8.0+（API 26）
            - iOS 14.0+
            - Windows 10+（64-bit）
            - macOS 11 Big Sur+
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
